# HAND-MAINTAINED — intentionally NOT generated by github-build. Weekly cron
# that bumps the external (non-cloud-officer) action versions in
# config/actions.yaml to their latest upstream major, then opens one PR for
# human review. The Ruby builders read the same manifest, so the next
# regeneration propagates the bump to every consumer repo (issue #408).
---
name: External actions bump
'on':
  schedule:
  - cron: '0 8 * * 1'
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: external-actions-bump
  cancel-in-progress: false
jobs:
  bump:
    name: Bump external action references
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      # Use our own composite checkout (not actions/checkout) so this
      # hand-maintained workflow carries no external action ref of its own.
      uses: cloud-officer/ci-actions/codedeploy/checkout@v2
      with:
        github-token: ${{ secrets.GH_PAT }}
        ssh-key: ''
    - name: Resolve, apply and open PR
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GH_PAT }}
      run: |
        set -euo pipefail

        git config user.name 'github-actions[bot]'
        git config user.email 'github-actions[bot]@users.noreply.github.com'

        branch='automated/bump-external-actions'
        base="$(gh repo view --json defaultBranchRef --jq '.defaultBranchRef.name')"
        body_file="$(mktemp)"

        bump-actions/bump-actions.sh --apply --pr-body-file "${body_file}"

        if git diff --quiet; then
          echo 'No external action bumps available.'
          exit 0
        fi

        git checkout -B "${branch}"
        git add -A
        git commit -m 'Bump external action references'
        # Our checkout composite uses persist-credentials:false, so authenticate
        # the push explicitly with the PAT (masked in logs as a registered secret).
        git push --force \
          "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
          "HEAD:${branch}"

        if gh pr view "${branch}" --json state --jq '.state' 2>/dev/null | grep -qx 'OPEN'; then
          echo "Existing PR for ${branch} updated in place."
        else
          gh pr create \
            --base "${base}" \
            --head "${branch}" \
            --title 'Bump external action references' \
            --body-file "${body_file}"
        fi
