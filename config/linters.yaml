---
# Linters Configuration
#
# Defines linters that are automatically enabled when matching files are found in the repository.
# Each linter generates a separate job in the GitHub Actions workflow.
#
# Detection: For each linter, files matching `pattern` are searched under `path`.
# If any matches are found, the linter job is added to the workflow.
#
# Field Reference:
#   short_name       (string, required) - Internal identifier used for filtering (via ignored_linters)
#                                         and display in step names
#   long_name        (string, required) - Human-readable name used in workflow job names
#   condition        (string, optional) - GitHub Actions `if` expression to restrict when the linter
#                                         runs. Common value: "github.event_name == 'pull_request'"
#                                         If omitted, the linter runs on all event types
#   uses             (string, required) - GitHub Actions action reference (without version suffix).
#                                         Version @v2 is appended automatically
#   config           (string, optional) - Linter config file name (e.g., ".eslintrc.json").
#                                         Resolved in order: (1) symlink from scripts submodule,
#                                         (2) preserve project's own config if preserve_config is true,
#                                         (3) copy from config/linters/ directory
#   path             (string, required) - Root directory to search for files matching `pattern`
#   pattern          (string, required) - Regex pattern to match source files (e.g., ".*\\.(py)$")
#   preserve_config  (bool, optional)   - If true, keeps the project's existing config file instead
#                                         of overwriting it. Used by Semgrep for custom .semgrepignore
#   content_match    (string, optional) - If set, files matching `pattern` are further filtered:
#                                         only files containing this literal string are kept.
#                                         Useful when file extensions alone can't identify the language
#   content_match_pattern (string, optional) - When set, `content_match` only applies to files
#                                         matching this sub-pattern. Other files pass through
#                                         unconditionally. If omitted, `content_match` applies to all files
#   permissions      (hash, optional)   - Job-level GitHub Actions permissions override
#                                         (e.g., {actions: read, contents: read})
#   directory        (string, optional) - Additional directory hint for the linter

actionlint:
  short_name: Actionlint
  long_name: Github Actions Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/actionlint
  config:
  path: ".github/workflows"
  pattern: ".*\\.(yml|yaml)$"
bandit:
  short_name: Bandit
  long_name: Python Bandit Linter
  uses: cloud-officer/ci-actions/linters/bandit
  config: ".bandit"
  path: "."
  pattern: ".*\\.(py)$"
cfnlint:
  short_name: Cfn-lint
  long_name: CloudFormation Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/cfnlint
  config: ".cfnlintrc"
  path: "."
  pattern: ".*\\.(yaml|yml|json)$"
  content_match: "AWSTemplateFormatVersion"
eslint:
  short_name: ESLint
  long_name: JavaScript ES Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/eslint
  config: ".eslintrc.json"
  path: "."
  pattern: ".*\\.(js|mjs|cjs)$"
flake8:
  short_name: Flake8
  long_name: Python Flake8 Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/flake8
  config: ".flake8"
  path: "."
  pattern: ".*\\.(py)$"
golangci:
  short_name: Golangci-lint
  long_name: Go Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/golangci
  config: ".golangci.yml"
  path: "."
  pattern: ".*\\.(go)$"
hadolint:
  short_name: Hadolint
  long_name: Docker Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/hadolint
  config: ".hadolint.yaml"
  path: "."
  pattern: ".*Dockerfile$"
ktlint:
  short_name: KTLint
  long_name: Kotlin Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/ktlint
  config: ".editorconfig"
  path: "."
  pattern: ".*\\.(kt|kts)$"
markdownlint:
  short_name: Markdownlint
  long_name: Markdown Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/markdownlint
  config: ".markdownlint.yml"
  path: "."
  pattern: ".*\\.(md)$"
phpcs:
  short_name: PHPCS
  long_name: PHP CS Linter
  uses: cloud-officer/ci-actions/linters/phpcs
  config:
  path: "."
  pattern: ".*\\.(php)$"
phpstan:
  short_name: PHPStan
  long_name: PHP Stan Linter
  uses: cloud-officer/ci-actions/linters/phpstan
  config:
  path: "."
  pattern: ".*\\.(php)$"
pmd:
  short_name: PMD
  long_name: Java Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/pmd
  config: ".pmd.xml"
  path: "."
  pattern: ".*\\.(java)$"
protolint:
  short_name: Protolint
  long_name: Protocol Buffer Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/protolint
  config: ".protolint.yaml"
  path: "."
  pattern: ".*\\.(proto)$"
semgrep:
  short_name: Semgrep
  long_name: Semgrep Security Scanner
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/semgrep
  config: ".semgrepignore"
  preserve_config: true
  path: "."
  pattern: ".*\\.(py|js|mjs|cjs|jsx|ts|tsx|go|rb|java|kt|php|c|cpp|cs|rs|swift|scala)$"
  permissions:
    actions: read
    contents: read
rubocop:
  short_name: Rubocop
  long_name: Ruby Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/rubocop
  config: ".rubocop.yml"
  path: "."
  pattern: "(.*\\/Fastfile$)|(.*\\.(rb)$)"
  directory: fastlane
shellcheck:
  short_name: ShellCheck
  long_name: Shell Scripts Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/shellcheck
  config: ".shellcheckrc"
  path: "."
  pattern: ".*\\.(sh)$"
swiftlint:
  short_name: Swiftlint
  long_name: Swift Linter
  uses: cloud-officer/ci-actions/linters/swiftlint
  config: ".swiftlint.yml"
  path: "."
  pattern: ".*\\.(swift)$"
trivy:
  short_name: Trivy
  long_name: Container & IaC Vulnerability Scanner
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/trivy
  config: ".trivyignore"
  path: "."
  pattern: "(.*\\.(tf)$)|(.*Dockerfile$)|(.*\\.(yaml|yml|json)$)|(.*/?(package-lock\\.json|yarn\\.lock|pnpm-lock\\.yaml|go\\.sum|requirements\\.txt|Pipfile\\.lock|poetry\\.lock|Gemfile\\.lock|composer\\.lock|pom\\.xml|build\\.gradle(\\.kts)?|Cargo\\.lock|Package\\.resolved)$)"
  content_match: "AWSTemplateFormatVersion"
  content_match_pattern: ".*\\.(yaml|yml)$"
yamllint:
  short_name: Yamllint
  long_name: YAML Linter
  condition: "github.event_name == 'pull_request'"
  uses: cloud-officer/ci-actions/linters/yamllint
  config: ".yamllint.yml"
  path: "."
  pattern: ".*\\.(yml|yaml)$"
