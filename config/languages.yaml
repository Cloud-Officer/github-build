python:
  short_name: python
  long_name: Python
  file_extension: py
  version_files:
    - .python-version
  setup_options:
    - name: python-version
      value: 3.14.3
    - name: python-version-file
      value:
    - name: python-cache
      value: pip
    - name: python-architecture
      value:
    - name: python-check-latest
      value:
    - name: python-token
      value:
    - name: python-cache-dependency-path
      value:
    - name: python-allow-prereleases
      value:
  dependencies:
    - dependency_file: requirements.txt
      install_dirs:
        - venv
        - .venv
        - env
        - __pycache__
        - .pytest_cache
      mongodb_dependency: mongo
      mysql_dependency: mysql
      redis_dependency: redis
      elasticsearch_dependency: elasticsearch
      package_manager_name: Pip
      package_manager_default: pip install -r requirements.txt
      package_manager_update: pip install pip-tools ; pip-compile --resolver=backtracking --upgrade --strip-extras --unsafe-package pip --unsafe-package setuptools --unsafe-package cuda-bindings --unsafe-package cuda-pathfinder --unsafe-package nvidia-cublas-cu12 --unsafe-package nvidia-cuda-cupti-cu12 --unsafe-package nvidia-cuda-nvrtc-cu12 --unsafe-package nvidia-cuda-runtime-cu12 --unsafe-package nvidia-cudnn-cu12 --unsafe-package nvidia-cufft-cu12 --unsafe-package nvidia-cufile-cu12 --unsafe-package nvidia-curand-cu12 --unsafe-package nvidia-cusolver-cu12 --unsafe-package nvidia-cusparse-cu12 --unsafe-package nvidia-cusparselt-cu12 --unsafe-package nvidia-nccl-cu12 --unsafe-package nvidia-nvjitlink-cu12 --unsafe-package nvidia-nvshmem-cu12 --unsafe-package nvidia-nvtx-cu12 --unsafe-package triton
      dependabot_ecosystem: pip
  unit_test_framework_name: Coverage
  unit_test_framework_default: coverage run -m unittest
swift:
  short_name: swift
  long_name: Swift
  file_extension: swift
  runs-on: macos-latest
  dependencies:
    - dependency_file: Gemfile
      install_dirs:
        - .bundle
        - DerivedData
      package_manager_name: Bundler
      package_manager_default: bundle install
      package_manager_update: bundle config set frozen false ; bundle update
      dependabot_ecosystem: bundler
    - dependency_file: Cartfile
      install_dirs:
        - Carthage
      package_manager_name: Carthage
      package_manager_default: carthage update
      package_manager_update: carthage update
      dependabot_ecosystem: swift
    - dependency_file: Podfile
      install_dirs:
        - Pods
      package_manager_name: CocoaPods
      package_manager_default: pod install
      package_manager_update: pod update
      dependabot_ecosystem: swift
    - dependency_file: Package.swift
      install_dirs:
        - .build
      package_manager_name: Swift Package Manager
      package_manager_default: swift package resolve
      package_manager_update: swift package update
      dependabot_ecosystem: swift
    - dependency_file: Tuist/Package.swift
      install_dirs:
        - .build
      package_manager_name: Tuist Package Manager
      package_manager_default: tuist install
      package_manager_update: tuist install --update
      dependabot_ecosystem: swift
  unit_test_framework_name: XCTest
  unit_test_framework_default: swift test
shell_script:
  short_name: shell_script
  long_name: Shell Script
  file_extension: sh|bats
  dependencies:
    - dependency_file: .bats
      package_manager_name: Bats Install
      package_manager_default: |-
        if [[ "$RUNNER_OS" == "macOS" ]]; then
          brew install bats-core
        else
          sudo apt-get update && sudo apt-get install -y bats
        fi
  unit_test_framework_name: Bats
  unit_test_framework_default: bats tests/
